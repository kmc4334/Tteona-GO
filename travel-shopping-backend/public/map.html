<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#map{width:100%;height:100%;overflow:hidden}
#sb{position:absolute;top:12px;left:50%;transform:translateX(-50%);
  width:calc(100% - 32px);max-width:400px;background:#fff;border-radius:24px;
  box-shadow:0 4px 20px rgba(0,0,0,0.15);display:flex;align-items:center;
  padding:10px 16px;z-index:10;}
#si{flex:1;border:none;outline:none;font-size:14px;color:#333;background:transparent;}
#sbtn{background:#4A90E2;color:#fff;border:none;border-radius:16px;
  padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;}
#cb{position:absolute;bottom:24px;right:16px;width:44px;height:44px;border-radius:22px;
  background:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.15);border:none;cursor:pointer;font-size:20px;z-index:10;}
#lg{position:absolute;bottom:80px;right:16px;background:#fff;border-radius:14px;
  padding:10px 14px;box-shadow:0 2px 12px rgba(0,0,0,0.12);z-index:10;}
.li{display:flex;align-items:center;margin-bottom:5px;font-size:11px;color:#555;}
.li:last-child{margin-bottom:0}.ld{width:10px;height:10px;border-radius:50%;margin-right:7px;}
</style>
</head>
<body>
<div id="sb">
  <span style="font-size:16px;margin-right:8px;color:#999">🔍</span>
  <input id="si" placeholder="장소를 검색해보세요"/>
  <button id="sbtn">검색</button>
</div>
<div id="map"></div>
<button id="cb" title="현재 위치">📍</button>
<div id="lg">
  <div class="li"><div class="ld" style="background:#4A90E2"></div>관광지</div>
  <div class="li"><div class="ld" style="background:#FF6B6B"></div>맛집</div>
  <div class="li"><div class="ld" style="background:#52C41A"></div>숙소</div>
  <div class="li"><div class="ld" style="background:#F39C12"></div>카페</div>
</div>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=465c44f70445398450bbdd46114f4728&libraries=services"></script>
<script>
// URL 파라미터로 center, places 받기
var params = new URLSearchParams(window.location.search);
var lat = parseFloat(params.get('lat') || '37.5663');
var lng = parseFloat(params.get('lng') || '126.9779');
var places = [];
try { places = JSON.parse(decodeURIComponent(params.get('places') || '[]')); } catch(e){}

var map = new kakao.maps.Map(document.getElementById('map'), {
  center: new kakao.maps.LatLng(lat, lng), level: 7
});
map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);

var ciw = null;
var EMOJI = {관광지:'🎡',맛집:'🍜',숙소:'🏨',카페:'☕',기타:'📍'};
var COLOR = {관광지:'#4A90E2',맛집:'#FF6B6B',숙소:'#52C41A',카페:'#F39C12',기타:'#9B59B6'};
var DAY_COLORS = ['#4A90E2','#FF6B6B','#52C41A','#F39C12','#9B59B6'];

// 현재위치 마커
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(function(p) {
    var pos = new kakao.maps.LatLng(p.coords.latitude, p.coords.longitude);
    new kakao.maps.CustomOverlay({
      position: pos,
      content: '<div style="width:14px;height:14px;border-radius:50%;background:#4A90E2;border:2px solid #fff;box-shadow:0 0 0 5px rgba(74,144,226,0.25);"></div>',
      yAnchor: 0.5
    }).setMap(map);
    map.setCenter(pos);
  });
}

// 여행지 마커
var dayGroups = {};
places.forEach(function(p, idx) {
  var d = p.day || 0;
  if (!dayGroups[d]) dayGroups[d] = [];
  dayGroups[d].push(p);

  var emoji = EMOJI[p.category] || '📍';
  var color = COLOR[p.category] || '#9B59B6';
  var pos = new kakao.maps.LatLng(p.lat, p.lng);
  var html = '<div style="width:34px;height:34px;border-radius:50%;background:'+color+';border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;">'+emoji+'</div>';
  var ov = new kakao.maps.CustomOverlay({position:pos, content:html, yAnchor:0.5});
  ov.setMap(map);

  var info = '<div style="padding:10px 14px;min-width:160px;"><b>'+emoji+' '+p.name+'</b><br/><span style="font-size:11px;color:'+color+';">'+p.category+'</span>'+(p.address?'<br/><span style="font-size:10px;color:#888;">'+p.address+'</span>':'')+'</div>';
  var iw = new kakao.maps.InfoWindow({content:info, removable:true});
  ov.getContent().addEventListener('click', function() {
    if(ciw) ciw.close();
    iw.open(map, new kakao.maps.Marker({position:pos}));
    ciw = iw; map.panTo(pos);
  });
});

// 경로선
Object.keys(dayGroups).forEach(function(day) {
  var pts = dayGroups[day];
  if (pts.length < 2) return;
  var color = DAY_COLORS[(Number(day)-1) % DAY_COLORS.length] || '#4A90E2';
  var sorted = pts.slice().sort(function(a,b){return (a.order||0)-(b.order||0);});
  new kakao.maps.Polyline({
    path: sorted.map(function(p){return new kakao.maps.LatLng(p.lat,p.lng);}),
    strokeWeight:3, strokeColor:color, strokeOpacity:0.8, strokeStyle:'shortdash'
  }).setMap(map);
});

// bounds
if (places.length > 1) {
  var b = new kakao.maps.LatLngBounds();
  places.forEach(function(p){b.extend(new kakao.maps.LatLng(p.lat,p.lng));});
  map.setBounds(b);
}

// 현재위치 버튼
document.getElementById('cb').onclick = function() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(p) {
      map.panTo(new kakao.maps.LatLng(p.coords.latitude, p.coords.longitude));
    });
  }
};

// 검색
var ps = new kakao.maps.services.Places();
var sm = [];
function search() {
  var kw = document.getElementById('si').value.trim();
  if (!kw) return;
  sm.forEach(function(m){m.setMap(null);}); sm=[];
  ps.keywordSearch(kw, function(data, status) {
    if (status !== kakao.maps.services.Status.OK) { alert('검색 결과 없음'); return; }
    var b = new kakao.maps.LatLngBounds();
    data.forEach(function(pl) {
      var pos = new kakao.maps.LatLng(pl.y, pl.x);
      var m = new kakao.maps.Marker({map:map, position:pos});
      var iw = new kakao.maps.InfoWindow({content:'<div style="padding:8px 12px;font-weight:bold;">'+pl.place_name+'</div>',removable:true});
      kakao.maps.event.addListener(m,'click',function(){if(ciw)ciw.close();iw.open(map,m);ciw=iw;map.panTo(pos);});
      sm.push(m); b.extend(pos);
    });
    map.setBounds(b);
  });
}
document.getElementById('sbtn').onclick = search;
document.getElementById('si').onkeydown = function(e){if(e.key==='Enter')search();};
</script>
</body>
</html>
